name: CI

on: push

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151
        with:
          install: true

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Knip
        run: npm run knip

      - name: Dependency cruiser
        run: npm run depcruise

      - name: Markdownlint
        run: npm run lint:md

      - name: Actionlint
        run: npm run lint:actions

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
