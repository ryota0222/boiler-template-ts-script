name: バグ報告
description: 不具合や予期しない動作を報告する
labels: ['bug']
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何が起きているかを簡潔に記述してください
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: バグを再現するための手順を記述してください
      placeholder: |
        1. '...' を実行する
        2. '...' を入力する
        3. エラーが発生する
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待される動作
      description: 本来どのように動作すべきかを記述してください
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 実際の動作
      description: 実際に何が起きたかを記述してください
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 環境
      description: 関連する環境情報を記述してください
      placeholder: |
        - Node.js: v22.x.x
        - OS: macOS xx.x
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: ログ・スクリーンショット
      description: エラーログやスクリーンショットがあれば添付してください
    validations:
      required: false
