name: 機能要望
description: 新機能や改善を提案する
labels: ['enhancement']
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 提案する機能を簡潔に記述してください
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 動機・課題
      description: なぜこの機能が必要かを記述してください
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのように実現したいかを記述してください
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討したアプローチがあれば記述してください
    validations:
      required: false
  - type: textarea
    id: tasks
    attributes:
      label: 対応内容
      description: 必要な作業をチェックリストで記述してください
      placeholder: |
        - [ ] タスク1
        - [ ] タスク2
    validations:
      required: false
