pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.ts'
      exclude: '*.config.ts'
      run: npx eslint {staged_files}
    - name: format
      run: npx prettier --check --ignore-unknown {staged_files}
    - name: typecheck
      run: npx tsc --noEmit
    - name: knip
      run: npx knip
    - name: depcruise
      run: npx depcruise src/
    - name: markdownlint
      glob: '*.md'
      run: npx markdownlint-cli2 {staged_files}
    - name: actionlint
      glob: '.github/workflows/*.yaml'
      run: actionlint {staged_files}

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}

pre-push:
  jobs:
    - name: test
      run: npx vitest run
